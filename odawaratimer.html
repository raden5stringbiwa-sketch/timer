<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>小田原タイマー</title>
  <style>
    body {
      background-color: #111;
      color: #eee;
      font-family: sans-serif;
      text-align: center;
      padding: 30px;
    }

    #titleRow {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
    }

    .titleLogo {
      width: 60px;
      height: 60px;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0, 255, 100, 0.35);
      opacity: 0.95;
    }

    h1 {
      color: #ff6600;
      font-size: 36px;
      margin: 0;
    }

    #countdown, #nextTime {
      font-size: 24px;
      margin: 10px 0;
    }

    #history {
      margin-top: 30px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    #history div {
      background-color: #222;
      padding: 10px 14px;
      margin-bottom: 6px;
      border-left: 4px solid #ff6600;
      font-size: 18px;
      line-height: 1.4;
    }

    #startButton {
      background: linear-gradient(45deg, #006633, #004422);
      color: #ffdd55;
      font-size: 24px;
      font-weight: bold;
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 255, 100, 0.4);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    #startButton:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0, 255, 100, 0.6);
    }

    #credit {
      margin-top: 5px;
      color: #66ff66;
      font-size: 16px;
      opacity: 0.85;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div id="titleRow">
    <img src="alliance_logo.jpg" class="titleLogo">
    <h1>小田原タイマー🏮</h1>
    <img src="alliance_logo.jpg" class="titleLogo">
  </div>

  <div id="credit">
    © 殺罰 — Crafted by 豆大福
  </div>

  <button id="startButton" onclick="startTimer()">🔥 タイマー開始 🔥</button>
  <p id="countdown">残り時間: -</p>
  <p id="nextTime">60分後の時刻: -</p>
  <div id="history"></div>

  <!-- 無音ファイル（自動再生解除用） -->
  <audio id="silent" src="silent.mp3" preload="none"></audio>

  <!-- 小田原征伐β：音声ファイル定義 -->
  <audio id="phase1200_1min"  src="phase1200_1min.m4a" preload="none"></audio>
  <audio id="phase1200_10sec" src="phase1200_10sec.m4a" preload="none"></audio>
  <audio id="phase1200"       src="phase1200.m4a" preload="none"></audio>

  <audio id="phaseShallow_1min"  src="phaseShallow_1min.m4a" preload="none"></audio>
  <audio id="phaseShallow_10sec" src="phaseShallow_10sec.m4a" preload="none"></audio>
  <audio id="phaseShallow"       src="phaseShallow.m4a" preload="none"></audio>

  <audio id="phaseSwamp_1min"  src="phaseSwamp_1min.m4a" preload="none"></audio>
  <audio id="phaseSwamp_10sec" src="phaseSwamp_10sec.m4a" preload="none"></audio>
  <audio id="phaseSwampGone"   src="phaseSwampGone.m4a" preload="none"></audio>

  <script>
    let timer;
    let startTime;
    const totalSeconds = 3600;
    const playedEvents = new Set();

/* 自動再生ブロック解除 */
async function unlockAudio() {
  const s = document.getElementById("silent");

  try {
    s.currentTime = 0;
    await s.play();
    s.pause();
    s.currentTime = 0;
  } catch (e) {}
}

    const eventMap = {
      1138: { id: "phase1200_1min",  label: "東西戦闘終了・南北/中央開放 1分前" },
      1188: { id: "phase1200_10sec", label: "東西戦闘終了・南北/中央開放 10秒前" },
      1198: { id: "phase1200",       label: "東西エリアの戦闘が終了しました。" },

      2038: { id: "phaseShallow_1min",  label: "浅瀬化（中央進入可能）1分前" },
      2088: { id: "phaseShallow_10sec", label: "浅瀬化（中央進入可能）10秒前" },
      2098: { id: "phaseShallow",       label: "河川が浅瀬に変化しました。" },

      2938: { id: "phaseSwamp_1min",  label: "沼地消失 1分前" },
      2988: { id: "phaseSwamp_10sec", label: "沼地消失 10秒前" },
      2998: { id: "phaseSwampGone",   label: "中央の沼地が消失しました。" }
    };
async function warmupAll() {

  const audios = document.querySelectorAll("audio");

  for (const audio of audios) {

    // silentはunlockAudioで処理済み
    if (audio.id === "silent") continue;

    try {

      audio.volume = 0;

      audio.currentTime = 0;

      // 読み込み待ち
      if (audio.readyState < 3) {
        await new Promise(resolve => {
          audio.addEventListener(
            "canplaythrough",
            resolve,
            { once:true }
          );
          audio.load();
        });
      }

      await audio.play();

      // 少しだけ再生時間を確保
      await new Promise(resolve => setTimeout(resolve, 300));

      audio.pause();
      audio.currentTime = 0;
      audio.volume = 1;

    } catch (err) {
      console.log("warmup error", audio.id, err);
    }

  }

}

    
    async function startTimer() {

      await unlockAudio();
  
      
      clearInterval(timer);
      playedEvents.clear();
      startTime = new Date();

      const future = new Date(startTime.getTime() + totalSeconds * 1000);
      document.getElementById("nextTime").textContent =
        "60分後の時刻: " + future.toLocaleTimeString();

      document.getElementById("history").innerHTML = "";



      timer = setInterval(() => {
        const now = new Date();
        const elapsed = Math.floor((now - startTime) / 1000);
        const remaining = totalSeconds - elapsed;

        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;

        document.getElementById("countdown").textContent =
          `残り時間: ${minutes}分${seconds}秒`;

        if (eventMap[elapsed] && !playedEvents.has(elapsed)) {
          const { id, label } = eventMap[elapsed];
const oldAudio = document.getElementById(id);

if (oldAudio) {

    const src = oldAudio.src;

    const audio = new Audio(src);
    audio.volume = 1;

    audio.play().catch(e => console.log(e));

}

            const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const ss = String(elapsed % 60).padStart(2, '0');
            const timestamp = now.toLocaleTimeString();

            const entry = document.createElement("div");
            entry.textContent = `${mm}分${ss}秒経過・${label}・${timestamp}`;

            const history = document.getElementById("history");
            history.insertBefore(entry, history.firstChild);

            playedEvents.add(elapsed);
          }
        }

        if (remaining <= 0) {
          clearInterval(timer);

          const entry = document.createElement("div");
          entry.textContent =
            `60分00秒経過・タイマー終了・${now.toLocaleTimeString()}`;

          const history = document.getElementById("history");
          history.insertBefore(entry, history.firstChild);
        }
      }, 1000);
    }
  </script>
</body>
</html>
